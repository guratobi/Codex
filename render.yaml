# Render 배포 설계도(Blueprint).
# render.com 에서 이 레포를 연결하면 이 파일을 읽어 자동으로 웹 서비스를 만든다.
# 너는 대시보드에서 ANTHROPIC_API_KEY 값만 붙여넣으면 된다(아래 sync:false 항목).
services:
  - type: web
    name: three-sisters
    runtime: python
    plan: free                      # 무료 플랜(유휴 시 잠들고, 다음 접속 때 ~50초 깨어남)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn three_sisters.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY      # 대시보드에서 직접 입력(코드/깃에 안 남는다)
        sync: false
      - key: THREE_SISTERS_MODEL    # 비용 줄이려면 claude-sonnet-4-6 으로 바꿔도 됨
        value: claude-opus-4-8
      - key: PYTHON_VERSION
        value: "3.12.7"

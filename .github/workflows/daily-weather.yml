name: Daily Weather Notification

on:
  schedule:
    # 매일 12:00 UTC = 한국시간 21:00
    - cron: "0 12 * * *"
  workflow_dispatch: {}  # 수동 실행 허용 (테스트용)

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 어제 만든 "내일=오늘" 예보 캐시 복원 (없으면 무시하고 계속)
      - name: Restore forecast cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: weather-cache-${{ github.run_id }}
          restore-keys: |
            weather-cache-

      - name: Send weather notification
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOME_LAT: ${{ vars.HOME_LAT || '37.6018' }}
          HOME_LON: ${{ vars.HOME_LON || '127.0537' }}
          HOME_LABEL: ${{ vars.HOME_LABEL || '이문동' }}
          WORK_LAT: ${{ vars.WORK_LAT || '37.5218' }}
          WORK_LON: ${{ vars.WORK_LON || '126.9244' }}
          WORK_LABEL: ${{ vars.WORK_LABEL || '여의도' }}
          QUIET_MODE: ${{ vars.QUIET_MODE || 'true' }}
        run: python weather_notify.py
